<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protein Recipe Finder</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1>Protein Recipe Finder</h1>
    <div class="settings-row">
      <label>Daily protein target (g)
        <select id="targetProtein"></select>
      </label>
      <div class="goal-readout" id="goalReadout"></div>
    </div>
  </header>

  <div class="layout">
    <main class="browse">
      <div class="controls">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="Search recipes or ingredients…" autocomplete="off">
          <button id="favoritesOnlyBtn" class="chip favorites-toggle" type="button">★ Favorites only</button>
        </div>

        <div class="chip-group">
          <span class="chip-group-label">Meal</span>
          <div class="chip-row" id="mealTypeChips"></div>
        </div>

        <div class="chip-group">
          <span class="chip-group-label">Device</span>
          <div class="chip-row" id="deviceChips"></div>
        </div>

        <div class="sort-row">
          <label for="sortSelect">Sort by</label>
          <select id="sortSelect">
            <option value="protein-desc">Protein (high → low)</option>
            <option value="calories-asc">Calories (low → high)</option>
            <option value="time-asc">Cook time (low → high)</option>
            <option value="name-asc">Name (A → Z)</option>
          </select>
        </div>
      </div>

      <div id="resultCount" class="result-count"></div>
      <div id="recipeGrid" class="recipe-grid"></div>
    </main>

    <aside class="plan-panel">
      <div class="plan-panel-header">
        <h2>Shopping List</h2>
        <button id="clearPlanBtn" class="link-btn">Clear all</button>
      </div>
      <div id="planList" class="plan-list"></div>
      <div id="planTotals" class="plan-totals"></div>

      <div class="budget-section">
        <div class="budget-header">
          <h3>Budget</h3>
          <span id="budgetEstimate" class="budget-estimate"></span>
        </div>
        <div class="budget-mode-row">
          <button class="chip budget-mode-btn active" data-mode="under" type="button">Stay under budget</button>
          <button class="chip budget-mode-btn" data-mode="around" type="button">Around budget</button>
        </div>
        <input id="budgetSlider" type="range" min="20" max="250" step="5">
        <div class="budget-slider-value">Budget: $<span id="budgetValueLabel"></span></div>
        <div class="progress-track"><div id="budgetProgressFill" class="progress-fill"></div></div>
        <div id="budgetStatusLine" class="status-line"></div>
      </div>

      <div class="grocery-subsection">
        <div class="grocery-header">
          <h3>Grocery List</h3>
          <div class="grocery-header-actions">
            <span id="copyFeedback" class="copy-feedback"></span>
            <button id="copyGroceryBtn" class="link-btn">Copy</button>
            <button id="downloadGroceryBtn" class="link-btn">Download</button>
            <button id="uncheckAllBtn" class="link-btn">Uncheck all</button>
          </div>
        </div>
        <div id="groceryList" class="grocery-list"></div>
      </div>
    </aside>
  </div>

</div>

<div id="recipeCardModal" class="modal-overlay hidden">
  <div class="modal-card">
    <button id="closeRecipeCardBtn" class="modal-close" type="button" aria-label="Close">✕</button>
    <div id="recipeCardContent"></div>
    <div class="modal-actions">
      <button id="printRecipeCardBtn" class="add-btn" type="button">Print</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
